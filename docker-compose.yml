services:

  app:
    image: eclipse-temurin:17-jdk
    container_name: NoticeBoard_App
    working_dir: /app
    volumes:
      - ./build/libs:/app
    command: [ "java", "-jar", "NoticeBoard-0.0.1-SNAPSHOT.jar" ]
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - mysql
      - redis
      - kafka
      - elasticsearch
    restart: always

  mysql:
    image: mysql:8.0.45
    container_name: NoticeBoard_MySQL
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: always

  redis:
    image: redis:7.4
    container_name: NoticeBoard_Redis
    ports:
      - "6379:6379"
    restart: always

  kafka:
    image: apache/kafka:3.9.2
    container_name: NoticeBoard_Kafka_broker
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://:9093 #kafka가 실제로 열어두는 주소
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://NoticeBoard_Kafka_broker:9092 #클라이언트에게 알려주는 주소
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@NoticeBoard_Kafka_broker:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1 # consumer offset 복제 수 (현재는 단일 서버, 실무에서는 3개의 서버 이용)
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3 # 기본 파티션 수 (병렬 처리)
    restart: always

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.19.13
    container_name: NoticeBoard_Elasticsearch
    environment:
      - discovery.type=single-node # ES 단일 노드 사용
      - xpack.security.enabled=false # 로그인 끔
      - ES_JAVA_OPTS=-Xms1g -Xmx1g # ES JVM 메모리 제한 (최소 1기가에서 최대 1기가)
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    restart: always

  prometheus:
    image: prom/prometheus:latest
    container_name: NoticeBoard_Prometheus
    volumes: # 내 Mac 파일을 컨테이너에 연결
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.6.0
    container_name: NoticeBoard_Grafana
    ports:
      - "3000:3000"

#  logstash:
#    image: docker.elastic.co/logstash/logstash:8.19.13
#    container_name: notice_logstash
#    volumes:
#      - ./logstash.conf:/usr/share/logstash/pipeline/logstash.conf
#    ports:
#      - "5000:5000"
#
#  kibana:
#    image: docker.elastic.co/kibana/kibana:8.19.13
#    container_name: notice_kibana
#    ports:
#      - "5601:5601"
#    depends_on: # ES 먼저 실행
#      - elasticsearch

  # Redis 모니터링
  redis-exporter:
    image: oliver006/redis_exporter
    container_name: redis_exporter
    ports:
      - "9121:9121"
    environment:
      REDIS_ADDR: redis://redis:6379

  # Kafka 모니터링
  kafka-exporter:
    image: danielqsj/kafka-exporter
    container_name: kafka_exporter
    ports:
      - "9308:9308"
    command:
      - "--kafka.server=NoticeBoard_Kafka_broker:9092"
    healthcheck:
      test: [ "CMD", "bash", "-c", "nc -z localhost 9092" ]
      interval: 10s   # 10초마다 검사
      timeout: 5s     # 5초내 응답 없으면 타임아웃
      retries: 10     # 10번 실패시 unhealthy
    restart: always

volumes:
  esdata:
  mysql_data: